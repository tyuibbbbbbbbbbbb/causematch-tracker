<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קמפיין תורתך באהבה - תצוגת מסך</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0f0c29 100%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        /* Top bar - compact */
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 25px;
            background: rgba(15,12,41,0.9);
            border-bottom: 1px solid rgba(224,198,127,0.2);
        }
        .top-bar h1 { font-size: 1.4em; color: #e0c67f; white-space: nowrap; }
        .top-stats {
            display: flex; gap: 20px; align-items: center;
        }
        .ts-item {
            text-align: center;
        }
        .ts-item .ts-val { font-size: 1.3em; font-weight: bold; direction: ltr; }
        .ts-item .ts-lbl { font-size: 0.65em; color: #aaa; }
        .ts-item.gold .ts-val { color: #e0c67f; }
        .ts-item.blue .ts-val { color: #4fc3f7; }
        .ts-item.green .ts-val { color: #81c784; }
        .ts-item.orange .ts-val { color: #ffb74d; }

        /* Progress bar inline */
        .prog-bar {
            flex: 1; max-width: 300px; margin: 0 20px;
        }
        .prog-outer {
            background: rgba(255,255,255,0.08); border-radius: 10px; height: 18px;
            overflow: hidden;
        }
        .prog-inner {
            height: 100%; border-radius: 10px;
            background: linear-gradient(90deg, #b88947, #e0c67f);
            transition: width 1s ease;
            display: flex; align-items: center; justify-content: flex-end; padding-right: 8px;
            font-weight: bold; color: #1a1a2e; font-size: 0.7em;
        }

        /* Donors grid - square cards */
        .donors-area {
            padding: 12px 20px 8px;
            flex: 1;
            overflow-y: auto;
        }
        .donors-area h3 { color: #e0c67f; font-size: 0.95em; margin-bottom: 10px; }
        .donors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }
        .donor-sq {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 14px;
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 100px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .donor-sq .ds-top { display: flex; align-items: center; gap: 10px; }
        .donor-sq .ds-icon {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #b88947, #e0c67f);
            display: flex; align-items: center; justify-content: center;
            font-size: 1em; flex-shrink: 0;
        }
        .donor-sq .ds-name { font-weight: bold; font-size: 0.95em; }
        .donor-sq .ds-amount {
            font-size: 1.5em; font-weight: bold; direction: ltr; text-align: left;
            margin-top: 6px;
        }
        .donor-sq .ds-amount.usd { color: #81c784; }
        .donor-sq .ds-amount.ils { color: #4fc3f7; }
        .donor-sq .ds-amount.gbp { color: #ce93d8; }
        .donor-sq .ds-via { font-size: 0.75em; color: #4fc3f7; margin-top: 3px; }
        .donor-sq .ds-comment { font-size: 0.7em; color: #aaa; margin-top: 3px; font-style: italic; }

        /* Charts row at bottom */
        .charts-row {
            display: flex; gap: 12px;
            padding: 0 20px 12px;
            height: 180px;
            flex-shrink: 0;
        }
        .chart-box {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 8px 12px;
            display: flex; flex-direction: column;
        }
        .chart-box h4 { color: #e0c67f; font-size: 0.8em; margin-bottom: 4px; flex-shrink: 0; }
        .chart-box .cw { flex: 1; min-height: 0; }

        /* Alert */
        .big-alert {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
            z-index: 999; opacity: 0; pointer-events: none;
            transition: opacity 0.4s;
        }
        .big-alert.show { opacity: 1; pointer-events: auto; }
        .big-alert-inner { text-align: center; animation: popIn 0.5s ease; }
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .big-alert .ba-icon { font-size: 5em; }
        .big-alert .ba-title { font-size: 3em; color: #e0c67f; margin: 15px 0; font-weight: bold; }
        .big-alert .ba-amount { font-size: 4em; color: #81c784; font-weight: bold; direction: ltr; }
        .big-alert .ba-donor { font-size: 1.5em; color: #4fc3f7; margin-top: 10px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

        /* Full height flex layout */
        .page-layout { display: flex; flex-direction: column; height: 100vh; }
    </style>
</head>
<body>
    <div class="big-alert" id="bigAlert">
        <div class="big-alert-inner">
            <div class="ba-icon">&#127881;</div>
            <div class="ba-title">תרומה חדשה!</div>
            <div class="ba-amount" id="baAmount"></div>
            <div class="ba-donor" id="baDonor"></div>
        </div>
    </div>

    <div class="page-layout">
        <!-- Compact top bar -->
        <div class="top-bar">
            <h1>&#11088; קמפיין תורתך באהבה</h1>
            <div class="top-stats">
                <div class="ts-item gold"><div class="ts-val" id="dTotalILS">---</div><div class="ts-lbl">&#8362; גויס</div></div>
                <div class="ts-item blue"><div class="ts-val" id="dTotalUSD">---</div><div class="ts-lbl">$ גויס</div></div>
                <div class="ts-item green"><div class="ts-val" id="dDonors">---</div><div class="ts-lbl">תורמים</div></div>
                <div class="ts-item orange"><div class="ts-val" id="dTimer">---</div><div class="ts-lbl">&#9200; נותר</div></div>
            </div>
            <div class="prog-bar">
                <div class="prog-outer"><div class="prog-inner" id="dProgress" style="width:0%">0%</div></div>
            </div>
        </div>

        <!-- Donors grid -->
        <div class="donors-area">
            <h3>&#128176; תורמים אחרונים</h3>
            <div class="donors-grid" id="donorsFeed">
                <div style="color:#888;text-align:center;padding:40px;grid-column:1/-1">טוען תורמים...</div>
            </div>
        </div>

        <!-- Charts at bottom - short -->
        <div class="charts-row">
            <div class="chart-box">
                <h4>&#127942; שגרירים - טופ 15</h4>
                <div class="cw"><canvas id="dAmbChart"></canvas></div>
            </div>
            <div class="chart-box">
                <h4>&#127963; קהילות</h4>
                <div class="cw"><canvas id="dCommChart"></canvas></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script>
        const CAMPAIGN_API = '/api/public/campaign/yth';
        const LAYER_API_BASE = '/api/public/layer-items?campaignId=5162';
        const DONATIONS_API = '/api/public/donations?campaignId=5162&paginate=30&page=1';

        let prevDonationIds = new Set();
        let campaignEndAt = null;

        function fmt(n) { return Math.round(n).toLocaleString('en-US'); }

        // Timer
        function updateTimer() {
            if (!campaignEndAt) return;
            const diff = new Date(campaignEndAt) - new Date();
            if (diff <= 0) { document.getElementById('dTimer').textContent = 'הקמפיין הסתיים'; return; }
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('dTimer').textContent =
                (d > 0 ? d + ' ימים ' : '') + h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }
        setInterval(updateTimer, 1000);

        // Charts - vertical (standing)
        function makeVChart(id) {
            return new Chart(document.getElementById(id).getContext('2d'), {
                type: 'bar',
                data: { labels: [], datasets: [
                    { label: 'גויס', data: [], backgroundColor: 'rgba(79,195,247,0.7)', borderColor: '#4fc3f7', borderWidth: 1, borderRadius: 3 },
                    { label: 'יעד', data: [], backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.15)', borderWidth: 1, borderRadius: 3 }
                ]},
                options: {
                    responsive: true, maintainAspectRatio: false,
                    animation: { duration: 600 },
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#ccc', font: { size: 8 }, maxRotation: 45, minRotation: 25 }, grid: { color: 'rgba(255,255,255,0.03)' } },
                        y: { ticks: { color: '#888', font: { size: 8 } }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                }
            });
        }

        const ambChart = makeVChart('dAmbChart');
        const commChart = makeVChart('dCommChart');

        function updateChart(chart, items) {
            chart.data.labels = items.map(f => {
                let n = f.name || '';
                return n.length > 22 ? n.substring(0, 22) + '...' : n;
            });
            chart.data.datasets[0].data = items.map(f => (f.statistics || {}).donationsAmount || 0);
            chart.data.datasets[1].data = items.map(f => f.goal || 0);
            chart.update('none');
        }

        // Campaign data
        async function fetchCampaign() {
            try {
                const r = await fetch(CAMPAIGN_API);
                const data = await r.json();
                const p = data.totalProgress;
                const ils = p.amounts.ILS || 0, usd = p.amounts.USD || 0;
                const count = p.count || 0;

                document.getElementById('dTotalILS').textContent = '₪' + fmt(ils);
                document.getElementById('dTotalUSD').textContent = '$' + fmt(usd);
                document.getElementById('dDonors').textContent = fmt(count);
                document.getElementById('dMatch').textContent = 'x' + (data.matchRatio || 0);

                const pct = Math.min(ils / 800000 * 100, 100);
                document.getElementById('dProgress').style.width = pct + '%';
                document.getElementById('dProgress').textContent = pct.toFixed(1) + '%';

                if (data.endAt) campaignEndAt = data.endAt;
            } catch (e) {}
        }

        // Fundraisers
        async function fetchFundraisers() {
            try {
                const layerUrl = p => LAYER_API_BASE + '&paginate=50&page=' + p;
                const r1 = await fetch(layerUrl(1));
                const d1 = await r1.json();
                let all = [...d1.docs];
                for (let pg = 2; pg <= d1.pages; pg++) {
                    const r = await fetch(layerUrl(pg));
                    const d = await r.json();
                    if (d.docs) all = all.concat(d.docs);
                }

                const amb = all
                    .filter(f => f.layer && f.layer.name === 'Ambassadors' && f.statistics && f.statistics.donationsAmount > 0)
                    .sort((a, b) => (b.statistics.donationsAmount || 0) - (a.statistics.donationsAmount || 0))
                    .slice(0, 15);
                updateChart(ambChart, amb);

                const comm = all
                    .filter(f => f.layer && f.layer.name === 'Communities' && f.statistics && f.statistics.donationsAmount > 0)
                    .sort((a, b) => (b.statistics.donationsAmount || 0) - (a.statistics.donationsAmount || 0))
                    .slice(0, 15);
                updateChart(commChart, comm);
            } catch (e) {}
        }

        // Donations feed
        async function fetchDonations() {
            try {
                const r = await fetch(DONATIONS_API);
                const data = await r.json();
                if (!data.docs) return;

                // Check for new donations
                const newOnes = data.docs.filter(d => !prevDonationIds.has(d.id));
                if (prevDonationIds.size > 0 && newOnes.length > 0) {
                    showBigAlert(newOnes[0]);
                }
                prevDonationIds = new Set(data.docs.map(d => d.id));

                const feed = document.getElementById('donorsFeed');
                feed.innerHTML = data.docs.map(d => {
                    const name = d.isAnonymous ? 'אנונימי' : (d.name || 'אנונימי');
                    const sym = d.currency === 'USD' ? '$' : d.currency === 'GBP' ? '£' : '₪';
                    const cls = d.currency === 'USD' ? 'usd' : d.currency === 'GBP' ? 'gbp' : 'ils';
                    const via = d.layerItem && d.layerItem.name ? d.layerItem.name : '';
                    const comment = d.comment || '';

                    return `<div class="donor-sq">
                        <div class="ds-top">
                            <div class="ds-icon">&#128150;</div>
                            <div class="ds-name">${name}</div>
                        </div>
                        <div class="ds-amount ${cls}">${sym}${fmt(d.amount)}</div>
                        ${via ? '<div class="ds-via">דרך: ' + via + '</div>' : ''}
                        ${comment ? '<div class="ds-comment">"' + comment + '"</div>' : ''}
                    </div>`;
                }).join('');
            } catch (e) {}
        }

        function showBigAlert(d) {
            const sym = d.currency === 'USD' ? '$' : d.currency === 'GBP' ? '£' : '₪';
            const name = d.isAnonymous ? 'אנונימי' : (d.name || 'אנונימי');
            document.getElementById('baAmount').textContent = sym + fmt(d.amount);
            document.getElementById('baDonor').textContent = name + (d.layerItem && d.layerItem.name ? ' דרך ' + d.layerItem.name : '');
            const el = document.getElementById('bigAlert');
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        // Start
        fetchCampaign();
        fetchFundraisers();
        fetchDonations();
        setInterval(fetchCampaign, 3000);
        setInterval(fetchFundraisers, 15000);
        setInterval(fetchDonations, 8000);
    </script>
</body>
</html>
