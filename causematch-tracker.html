<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מעקב קמפיין - ישיבת תפארת התורה</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(184, 137, 71, 0.5);
            color: #e0c67f;
        }

        .subtitle {
            font-size: 1.1em;
            color: #aaa;
            margin-bottom: 30px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 900px;
            width: 100%;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(184, 137, 71, 0.2);
        }

        .card-label {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-value {
            font-size: 2.2em;
            font-weight: bold;
            color: #e0c67f;
            direction: ltr;
        }

        .card-value.ils { color: #4fc3f7; }
        .card-value.usd { color: #81c784; }
        .card-value.gbp { color: #ce93d8; }
        .card-value.count { color: #ffb74d; }
        .card-value.match { color: #ef5350; }

        .card-sub {
            font-size: 0.85em;
            color: #777;
            margin-top: 5px;
        }

        /* Progress Bar */
        .progress-section {
            max-width: 900px;
            width: 100%;
            margin-bottom: 30px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 1em;
        }

        .progress-bar-bg {
            width: 100%;
            height: 28px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #b88947, #e0c67f);
            border-radius: 14px;
            transition: width 1s ease;
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-percent {
            text-align: center;
            margin-top: 8px;
            font-size: 1.2em;
            color: #e0c67f;
            font-weight: bold;
        }

        /* Timer */
        .timer-section {
            max-width: 900px;
            width: 100%;
            text-align: center;
            margin-bottom: 25px;
        }

        .timer-label {
            font-size: 1em;
            color: #999;
            margin-bottom: 12px;
        }

        .timer {
            display: flex;
            justify-content: center;
            gap: 15px;
            direction: ltr;
        }

        .timer-unit {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 15px 20px;
            min-width: 80px;
        }

        .timer-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #e0c67f;
            line-height: 1;
        }

        .timer-text {
            font-size: 0.75em;
            color: #888;
            margin-top: 4px;
        }

        .timer-ended {
            font-size: 1.5em;
            color: #ef5350;
            font-weight: bold;
        }

        /* Status & Log */
        .status-bar {
            max-width: 900px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85em;
            color: #666;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 6px;
            animation: pulse 2s infinite;
        }

        .status-dot.active { background: #4caf50; }
        .status-dot.error { background: #ef5350; animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .change-log {
            max-width: 900px;
            width: 100%;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
        }

        .change-log-title {
            font-size: 0.95em;
            color: #e0c67f;
            margin-bottom: 8px;
        }

        .change-entry {
            font-size: 0.82em;
            color: #aaa;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            direction: ltr;
            text-align: left;
        }

        .change-entry .up { color: #81c784; }
        .change-entry .time { color: #666; }
    </style>
</head>
<body>
    <h1>ישיבת תפארת התורה</h1>
    <div class="subtitle">מעקב קמפיין בזמן אמת - תורתך באהבה</div>

    <!-- Timer -->
    <div class="timer-section">
        <div class="timer-label">זמן שנותר לסיום הקמפיין</div>
        <div class="timer" id="timer"></div>
    </div>

    <!-- Cards -->
    <div class="dashboard">
        <div class="card">
            <div class="card-label">סכום בשקלים</div>
            <div class="card-value ils" id="amountILS">---</div>
            <div class="card-sub">יעד: ₪800,000</div>
        </div>
        <div class="card">
            <div class="card-label">סכום בדולרים</div>
            <div class="card-value usd" id="amountUSD">---</div>
        </div>
        <div class="card">
            <div class="card-label">סכום בליש"ט</div>
            <div class="card-value gbp" id="amountGBP">---</div>
        </div>
        <div class="card">
            <div class="card-label">מספר תורמים</div>
            <div class="card-value count" id="donorsCount">---</div>
        </div>
        <div class="card">
            <div class="card-label">סה"כ תרומות (כולל מצ'ינג)</div>
            <div class="card-value" id="totalSum">---</div>
        </div>
        <div class="card">
            <div class="card-label">יחס מצ'ינג נוכחי</div>
            <div class="card-value match" id="matchRatio">---</div>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-section">
        <div class="progress-header">
            <span id="progressRaised">₪0</span>
            <span>יעד: ₪800,000</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="progress-percent" id="progressPercent">0%</div>
    </div>

    <!-- Status -->
    <div class="status-bar">
        <div>
            <span class="status-dot active" id="statusDot"></span>
            <span id="statusText">מתחבר...</span>
        </div>
        <div id="lastUpdate">עדכון אחרון: --:--:--</div>
    </div>

    <!-- Change Log -->
    <div class="change-log">
        <div class="change-log-title">יומן שינויים</div>
        <div id="logEntries"></div>
    </div>

    <script>
        const API_URL = '/api/campaign';
        const GOAL_ILS = 800000;
        const POLL_INTERVAL_MS = 3000;

        let prevData = null;
        let fetchCount = 0;
        let errorCount = 0;

        // ========== TIMER ==========
        let campaignEndAt = null;

        function updateTimer() {
            const timerEl = document.getElementById('timer');
            if (!campaignEndAt) {
                timerEl.innerHTML = '<div class="timer-ended">טוען...</div>';
                return;
            }

            const now = new Date();
            const end = new Date(campaignEndAt);
            const diff = end - now;

            if (diff <= 0) {
                timerEl.innerHTML = '<div class="timer-ended">הקמפיין הסתיים!</div>';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            timerEl.innerHTML = `
                <div class="timer-unit">
                    <div class="timer-number">${String(days).padStart(2, '0')}</div>
                    <div class="timer-text">ימים</div>
                </div>
                <div class="timer-unit">
                    <div class="timer-number">${String(hours).padStart(2, '0')}</div>
                    <div class="timer-text">שעות</div>
                </div>
                <div class="timer-unit">
                    <div class="timer-number">${String(minutes).padStart(2, '0')}</div>
                    <div class="timer-text">דקות</div>
                </div>
                <div class="timer-unit">
                    <div class="timer-number">${String(seconds).padStart(2, '0')}</div>
                    <div class="timer-text">שניות</div>
                </div>
            `;
        }

        setInterval(updateTimer, 1000);

        // ========== FORMAT ==========
        function formatNumber(num, decimals = 0) {
            return Number(num).toLocaleString('en-US', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
            });
        }

        // ========== LOG ==========
        function addLog(message) {
            const logEl = document.getElementById('logEntries');
            const time = new Date().toLocaleTimeString('he-IL');
            const entry = document.createElement('div');
            entry.className = 'change-entry';
            entry.innerHTML = `<span class="time">[${time}]</span> ${message}`;
            logEl.prepend(entry);

            while (logEl.children.length > 50) {
                logEl.removeChild(logEl.lastChild);
            }
        }

        // ========== UPDATE UI ==========
        function updateUI(data) {
            const progress = data.totalProgress;
            const ils = progress.amounts.ILS || 0;
            const usd = progress.amounts.USD || 0;
            const gbp = progress.amounts.GBP || 0;
            const count = progress.count || 0;
            const donationsSum = data.donationsSum || 0;
            const matchRatio = data.matchRatio || 0;

            document.getElementById('amountILS').textContent = '₪' + formatNumber(ils);
            document.getElementById('amountUSD').textContent = '$' + formatNumber(usd);
            document.getElementById('amountGBP').textContent = '£' + formatNumber(gbp);
            document.getElementById('donorsCount').textContent = formatNumber(count);
            document.getElementById('totalSum').textContent = '₪' + formatNumber(donationsSum);
            document.getElementById('matchRatio').textContent = 'x' + matchRatio;

            // Progress
            const percent = Math.min((ils / GOAL_ILS) * 100, 100);
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressPercent').textContent = percent.toFixed(1) + '%';
            document.getElementById('progressRaised').textContent = '₪' + formatNumber(ils);

            // Timer
            if (data.endAt) {
                campaignEndAt = data.endAt;
            }

            // Detect changes
            if (prevData) {
                const prevIls = prevData.totalProgress.amounts.ILS || 0;
                const prevCount = prevData.totalProgress.count || 0;

                if (ils !== prevIls) {
                    const diff = ils - prevIls;
                    addLog(`<span class="up">+₪${formatNumber(diff)}</span> שקלים (סה"כ: ₪${formatNumber(ils)})`);
                }
                if (count !== prevCount) {
                    const diff = count - prevCount;
                    addLog(`<span class="up">+${diff}</span> תורמים חדשים (סה"כ: ${formatNumber(count)})`);
                }
                if (data.matchRatio !== prevData.matchRatio) {
                    addLog(`יחס מצ'ינג השתנה ל-x${data.matchRatio}`);
                }
            }

            prevData = JSON.parse(JSON.stringify(data));
        }

        // ========== FETCH ==========
        async function fetchData() {
            try {
                const response = await fetch(API_URL, {
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                fetchCount++;
                errorCount = 0;

                updateUI(data);

                // Status
                document.getElementById('statusDot').className = 'status-dot active';
                document.getElementById('statusText').textContent = `מחובר (בדיקה #${fetchCount})`;
                document.getElementById('lastUpdate').textContent =
                    'עדכון אחרון: ' + new Date().toLocaleTimeString('he-IL');

            } catch (err) {
                errorCount++;
                document.getElementById('statusDot').className = 'status-dot error';
                document.getElementById('statusText').textContent = `שגיאה: ${err.message} (ניסיון ${errorCount})`;
                addLog(`שגיאה: ${err.message}`);
            }
        }

        // ========== START ==========
        addLog('המעקב התחיל - מתחבר ל-API...');
        fetchData();
        setInterval(fetchData, POLL_INTERVAL_MS);
    </script>
</body>
</html>
